<script>
injectNav('movers'); injectFooter(); applyTheme();

let allMovers = [];
let currentMovers = [];
let currentPage = 0;
const PER_PAGE = 20;

function renderPage() {
  const container = document.getElementById('moversContainer');
  if (!currentMovers.length) {
    container.innerHTML = '<div class="loading-text">No data for this filter.</div>';
    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = true;
    return;
  }
  const slice = currentMovers.slice(currentPage * PER_PAGE, (currentPage + 1) * PER_PAGE);
  container.innerHTML = slice.map(m => {
    const chg = parseFloat(m['Change%']) || 0;
    const dir = chg >= 0 ? 'up' : 'down';
    return `<div class="mover-card ${dir}-card searchable">
      <div>
        <div class="mover-name">${decodeHTML(m.Name||'')}</div>
        <div class="mover-sector">NSE/BSE</div>
      </div>
      <div class="mover-price">
        <div class="mover-cmp">₹${String(m.CMP||'')}</div>
        <span class="mover-change ${dir}">${chg>=0?'+':''}${chg}%</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = (currentPage+1)*PER_PAGE >= currentMovers.length;
}

function showTab(type) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active',
      (i===0&&type==='all')||(i===1&&type==='up')||(i===2&&type==='down'));
  });
  currentMovers = type === 'all' ? allMovers :
    type === 'up' ? allMovers.filter(m => parseFloat(m['Change%']) >= 0) :
    allMovers.filter(m => parseFloat(m['Change%']) < 0);
  currentPage = 0;
  renderPage();
}

document.getElementById('prevBtn').onclick = () => {
  if (currentPage > 0) { currentPage--; renderPage(); }
};
document.getElementById('nextBtn').onclick = () => {
  if ((currentPage+1)*PER_PAGE < currentMovers.length) { currentPage++; renderPage(); }
};

// Load data
window.addEventListener('load', async () => {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    allMovers = data.movers || [];
    if (!allMovers.length) {
      document.getElementById('moversContainer').innerHTML = '<div class="loading-text">No movers data available.</div>';
      return;
    }
    currentMovers = allMovers;
    renderPage();
  } catch(e) {
    document.getElementById('moversContainer').innerHTML = '<div class="loading-text">Failed to load data. Please refresh.</div>';
  }
});
</script>
