<body>
<div class="page-header">

    <button class="tab-btn" onclick="showTab52('low')">🔻 52W Low</button>
  </div>
  <div id="highContainer" class="card-grid">
    <div class="loading-text">⏳ Loading 52 week data...</div>
  </div>
  <div id="lowContainer" class="card-grid" style="display:none">
    <div class="loading-text">⏳ Loading...</div>
  </div>
</div>

<script>
injectNav('52week'); injectFooter(); applyTheme();

function showTab52(tab) {
  document.getElementById('highContainer').style.display = tab === 'high' ? '' : 'none';
  document.getElementById('lowContainer').style.display = tab === 'low' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='high') || (i===1 && tab==='low'));
  });
}

function renderStockCards(container, stocks, type) {
  if (!stocks || !stocks.length) {
    container.innerHTML = '<div class="loading-text">No data available. Market may be closed.</div>';
    return;
  }
  container.innerHTML = stocks.map(s => {
    var chg = parseFloat(s['Change%']) || 0;
    var dir = type === 'high' ? 'up' : 'down';
    var price = s.Price || 0;
    var val52 = s.Value52 || 0;
    return `<div class="mover-card ${dir}-card searchable">
      <div>
        <div class="mover-name">${decodeHTML(s.Name||'')}</div>
        <div class="mover-sector">52W ${type === 'high' ? 'High' : 'Low'}: ₹${Number(val52).toLocaleString('en-IN')}</div>
      </div>
      <div class="mover-price">
        <div class="mover-cmp">₹${Number(price).toLocaleString('en-IN')}</div>
        <span class="mover-change ${dir}">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</span>
      </div>
    </div>`;
  }).join('');
}

(async () => {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    var w = data.week52 || { high: [], low: [] };
    renderStockCards(document.getElementById('highContainer'), w.high, 'high');
    renderStockCards(document.getElementById('lowContainer'), w.low, 'low');
  } catch(e) {
    document.getElementById('highContainer').innerHTML = '<div class="loading-text">Failed to load data. Please refresh.</div>';
  }
})();
</script>
