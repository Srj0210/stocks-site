<script>

// ===== F&O EXPIRY DATES (2026) =====
// NSE: Weekly = every Thursday, Monthly = last Thursday of month
function getNextThursdays() {
  const thursdays = [];
  const now = new Date();
  let d = new Date(now);
  d.setHours(15, 30, 0, 0);

  // Find next 8 Thursdays
  while (thursdays.length < 8) {
    if (d.getDay() === 4) {
      if (d > now) thursdays.push(new Date(d));
    }
    d.setDate(d.getDate() + 1);
  }
  return thursdays;
}

function getLastThursday(year, month) {
  const d = new Date(year, month + 1, 0);
  while (d.getDay() !== 4) d.setDate(d.getDate() - 1);
  return d;
}

function getCountdown(target) {
  const now = new Date();
  const diff = target - now;
  if (diff <= 0) return { d: 0, h: 0, m: 0, s: 0, past: true };
  return {
    d: Math.floor(diff / 86400000),
    h: Math.floor((diff % 86400000) / 3600000),
    m: Math.floor((diff % 3600000) / 60000),
    s: Math.floor((diff % 60000) / 1000),
    past: false
  };
}

function pad(n) { return String(n).padStart(2, '0'); }

function renderCountdowns() {
  const thursdays = getNextThursdays();
  const now = new Date();

  // Next weekly expiry
  const weekly = thursdays[0];
  // Next monthly expiry
  let monthly = null;
  for (let m = now.getMonth(); m < now.getMonth() + 6; m++) {
    const last = getLastThursday(now.getFullYear() + Math.floor(m/12), m % 12);
    last.setHours(15, 30, 0, 0);
    if (last > now) { monthly = last; break; }
  }
  // Next quarterly (March, June, Sep, Dec last Thursday)
  let quarterly = null;
  const qMonths = [2, 5, 8, 11];
  for (const qm of qMonths) {
    const yr = now.getFullYear() + (qm < now.getMonth() ? 1 : 0);
    const last = getLastThursday(yr, qm);
    last.setHours(15, 30, 0, 0);
    if (last > now) { quarterly = last; break; }
  }

  const cards = [
    { type: 'weekly', label: 'WEEKLY', title: 'Weekly F&O Expiry', date: weekly },
    { type: 'monthly', label: 'MONTHLY', title: 'Monthly F&O Expiry', date: monthly },
    { type: 'quarterly', label: 'QUARTERLY', title: 'Quarterly Expiry', date: quarterly },
  ];

  const grid = document.getElementById('countdownGrid');

  function renderAll() {
    grid.innerHTML = cards.map(c => {
      const cd = getCountdown(c.date);
      const urgent = cd.d < 2 && !cd.past;
      const dateStr = c.date ? c.date.toLocaleDateString('en-IN', { weekday:'short', day:'2-digit', month:'short', year:'numeric' }) : 'N/A';
      const timeStr = c.date ? c.date.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' }) + ' IST' : '';
      return `
        <div class="countdown-card ${c.type}">
          <div class="cd-type ${c.type}">${c.label} EXPIRY</div>
          <div class="cd-title">${c.title}</div>
          <div class="cd-date">📅 ${dateStr} · ${timeStr}</div>
          <div class="cd-timer ${urgent ? 'urgent' : ''}">
            <div class="cd-unit"><span class="cd-num" id="cd-${c.type}-d">${pad(cd.d)}</span><span class="cd-label">Days</span></div>
            <div class="cd-unit"><span class="cd-num" id="cd-${c.type}-h">${pad(cd.h)}</span><span class="cd-label">Hours</span></div>
            <div class="cd-unit"><span class="cd-num" id="cd-${c.type}-m">${pad(cd.m)}</span><span class="cd-label">Mins</span></div>
            <div class="cd-unit"><span class="cd-num" id="cd-${c.type}-s">${pad(cd.s)}</span><span class="cd-label">Secs</span></div>
          </div>
        </div>`;
    }).join('');
  }

  renderAll();

  // Live tick
  setInterval(() => {
    cards.forEach(c => {
      const cd = getCountdown(c.date);
      const dEl = document.getElementById(`cd-${c.type}-d`);
      if (!dEl) return;
      dEl.textContent = pad(cd.d);
      document.getElementById(`cd-${c.type}-h`).textContent = pad(cd.h);
      document.getElementById(`cd-${c.type}-m`).textContent = pad(cd.m);
      document.getElementById(`cd-${c.type}-s`).textContent = pad(cd.s);
    });
  }, 1000);
}

  { date:'2026-10-02', title:'Gandhi Jayanti — Market Holiday', type:'holiday', tag:'tag-holiday', desc:'NSE & BSE closed' },
  { date:'2026-11-14', title:'Diwali (Laxmi Pujan) — Market Holiday', type:'holiday', tag:'tag-holiday', desc:'NSE & BSE closed' },
  { date:'2026-12-25', title:'Christmas — Market Holiday', type:'holiday', tag:'tag-holiday', desc:'NSE & BSE closed' },
].sort((a, b) => new Date(a.date) - new Date(b.date));

let activeFilter = 'all';

function filterEvents(type, btn) {
  activeFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEvents();
}

function renderEvents() {
  const now = new Date(); now.setHours(0,0,0,0);
  const filtered = activeFilter === 'all' ? EVENTS : EVENTS.filter(e => e.type === activeFilter);

  document.getElementById('eventList').innerHTML = filtered.map(ev => {
    const evDate = new Date(ev.date);
    const diff = Math.round((evDate - now) / 86400000);
    let daysLabel, daysClass;
    if (diff < 0)       { daysLabel = `${Math.abs(diff)}d ago`; daysClass = 'past'; }
    else if (diff === 0){ daysLabel = 'Today!'; daysClass = 'today'; }
    else if (diff <= 7) { daysLabel = `${diff}d left`; daysClass = 'soon'; }
    else                { daysLabel = `${diff}d left`; daysClass = 'future'; }

    const dateStr = evDate.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
    return `
      <div class="event-item">
        <div class="event-dot ${ev.type}"></div>
        <div class="event-content">
          <div class="event-title">${ev.title}</div>
          <div class="event-meta">${ev.desc}</div>
          <span class="event-tag ${ev.tag}">${ev.type.toUpperCase()}</span>
        </div>
        <div class="event-right">
          <div class="event-days ${daysClass}">${daysLabel}</div>
          <div style="font-size:0.72rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:2px">${dateStr}</div>
        </div>
      </div>`;
  }).join('');
}

renderCountdowns();
