<script>
injectNav('news'); injectFooter(); applyTheme();
(async () => {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    if (!data.news?.length) {
      document.getElementById('newsContainer').innerHTML = '<div class="loading-text">No news available.</div>';
      return;
    }
    paginate('newsContainer', data.news, n => `
      <div class="news-card searchable">
        <a href="${escapeHTML(n.Link||'#')}" target="_blank" rel="noopener noreferrer">${decodeHTML(n.Title||'')}</a>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <div class="news-meta">${escapeHTML(n.Published||'')}</div>
          ${n.Source ? `<span class="news-source">${escapeHTML(n.Source)}</span>` : ''}
        </div>
      </div>`, 12);
  } catch(e) {
    document.getElementById('newsContainer').innerHTML = '<div class="loading-text">Failed to load news. Please try again.</div>';
  }
})();
</script>
