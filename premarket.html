<body>
<div class="page-header">
  <h1>🌅 Pre-Market <span>Data</span></h1>
  <p>Pre-open session stocks — Nifty 50 components</p>
</div>
<div class="main-wrap">
  <div style="text-align:center;margin-bottom:0.5rem;min-height:0">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1041324645386243" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>
  </div>

  <div class="section-block" style="background:rgba(79,195,247,0.05);border-color:rgba(79,195,247,0.2);margin-bottom:1.5rem">
    <p style="color:var(--blue);font-size:0.85rem;font-family:var(--font-mono)">
      ℹ️ Pre-market data is available during 9:00 - 9:15 AM IST (pre-open session). Outside this window, last available data is shown.
    </p>
  </div>

  <div id="premarketContainer" class="card-grid">
    <div class="loading-text">⏳ Loading pre-market data...</div>
  </div>
</div>
<script src="assets/js/shared.js?v22"></script>
<script src="assets/js/common.security.js?v22"></script>
<script src="assets/js/common.js?v22"></script>
<script>
injectNav('premarket'); injectFooter(); applyTheme();

(async () => {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    var stocks = data.premarket || [];
    var container = document.getElementById('premarketContainer');
    if (!stocks.length) {
      container.innerHTML = '<div class="loading-text">No pre-market data available. Data is updated during pre-open session (9:00-9:15 AM IST).</div>';
      return;
    }
    container.innerHTML = stocks.map((s, i) => {
      var chg = parseFloat(s['Change%']) || 0;
      var dir = chg >= 0 ? 'up' : 'down';
      return `<div class="mover-card ${dir}-card searchable">
        <div>
          <div class="mover-name"><span style="color:var(--blue);font-family:var(--font-mono);font-size:0.75rem">#${i+1}</span> ${decodeHTML(s.Name||'')}</div>
          <div class="mover-sector">Pre-Open</div>
        </div>
        <div class="mover-price">
          <div class="mover-cmp">₹${Number(s.Price||0).toLocaleString('en-IN')}</div>
          <span class="mover-change ${dir}">${chg >= 0 ? '+' : ''}${chg.toFixed(2)}%</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('premarketContainer').innerHTML = '<div class="loading-text">Failed to load data. Please refresh.</div>';
  }
})();
</script>
