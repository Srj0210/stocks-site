];

let activeSector = null;

function renderSectors() {
  document.getElementById('sectorGrid').innerHTML = SECTORS.map(s => `
    <div class="sector-card ${activeSector === s.id ? 'active' : ''}" onclick="selectSector('${s.id}')">
      <div class="sector-header">
        <div class="sector-icon" style="background:${s.bg}">${s.icon}</div>
        <div class="sector-info">
          <div class="sector-name">${s.name}</div>
          <div class="sector-index">${s.tvIndex.replace("BSE:","")} BSE</div>
        </div>
      </div>
      <div class="sector-stocks">
        ${s.stocks.slice(0,4).map(st => `<span class="stock-chip">${st.name}</span>`).join('')}
        <span class="stock-chip" style="color:var(--text-muted)">+${s.stocks.length - 4} more</span>
      </div>
    </div>`).join('');
}

function selectSector(id) {
  activeSector = id;
  const s = SECTORS.find(x => x.id === id);
  renderSectors();

  const panel = document.getElementById('detailPanel');
  panel.style.display = 'block';
  panel.innerHTML = `
    <div class="detail-panel">
      <div class="detail-header">
        <div class="sector-icon" style="background:${s.bg};width:48px;height:48px;font-size:1.5rem;border-radius:12px;display:flex;align-items:center;justify-content:center">${s.icon}</div>
        <div>
          <div class="detail-title">${s.name}</div>
          <div class="detail-subtitle">${s.desc}</div>
        </div>
      </div>

      <div class="section-title" style="margin-bottom:1rem">
        <span class="icon">📊</span> ${s.name} — ${s.tvIndex.replace("BSE:","")} (BSE)
        <span style="font-size:0.72rem;color:var(--text-muted);font-weight:400;margin-left:8px">Representative stock chart</span>
      </div>
      <div class="chart-container" id="sector-chart-${id}"></div>

      <div class="section-title" style="margin-bottom:1rem"><span class="icon">🏢</span> Top Stocks in ${s.name}</div>
      <div class="stocks-detail">
        ${s.stocks.map(st => `
          <div class="stock-detail-card">
            <div class="sdc-name">${st.name}</div>
            <div class="sdc-symbol">${st.sym}</div>
            <div class="sdc-desc">${st.desc}</div>
            <div style="margin-top:6px">
              <span class="sdc-cap cap-${st.cap}">${st.cap.toUpperCase()} CAP</span>
            </div>
          </div>`).join('')}
      </div>
    </div>`;

  // Load TradingView chart with unique ID to prevent caching
  const chartId = `sector-chart-${id}-${Date.now()}`;
  document.getElementById(`sector-chart-${id}`).id = chartId;

  setTimeout(() => {
    try {
      new TradingView.widget({
        container_id: chartId,
        symbol: s.tvIndex,
        interval: 'D',
        timezone: 'Asia/Kolkata',
        theme: 'dark',
        style: '1',
        locale: 'en',
        allow_symbol_change: true,
        autosize: true,
        hide_top_toolbar: false,
        save_image: false,
        backgroundColor: 'rgba(13,14,26,1)',
        gridColor: 'rgba(240,165,0,0.05)',
        overrides: {
          'paneProperties.background': '#05060f',
          'paneProperties.backgroundType': 'solid'
        }
      });
    } catch(e) {
      document.getElementById(chartId).innerHTML =
        `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:0.9rem;flex-direction:column;gap:12px">
          <div style="font-size:2rem">📊</div>
          <div>Chart: <strong style="color:var(--gold)">${s.tvIndex.replace('BSE:','')}</strong> on BSE</div>
          <a href="https://www.tradingview.com/chart/?symbol=${encodeURIComponent(s.tvIndex)}" target="_blank" rel="noopener noreferrer" style="color:var(--gold);text-decoration:none;border:1px solid rgba(240,165,0,0.3);padding:8px 18px;border-radius:8px;font-size:0.85rem">View on TradingView →</a>
        </div>`;
    }
  }, 200);

  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

renderSectors();
</script>
