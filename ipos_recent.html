<script>
injectNav('ipos'); injectFooter(); applyTheme();
(async () => {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();
    const key = 'ipos_recent';
    const ipos = data[key] || [];
    if (!ipos.length) {
      document.getElementById('ipoBody').innerHTML = '<tr><td colspan="6" class="loading-text">No IPO data available.</td></tr>';
      return;
    }
    paginate('ipoBody', ipos, i => `<tr class="searchable">
      <td>${decodeHTML(i.Name||'')}</td>
      <td><span class="badge ${'recent'==='upcoming'?'badge-blue':'badge-gold'}">${decodeHTML(i['Issue Type']||i.Type||'')}</span></td>
      <td class="mono">${decodeHTML(i['Price Band']||i.Price||'')}</td>
      <td class="mono">${formatDate(i['Open Date']||i.Open||'')}</td>
      <td class="mono">${formatDate(i['Close Date']||i.Close||'')}</td>
      <td class="mono">${decodeHTML(i['Issue Size']||i.Size||'')}</td>
    </tr>`, 15);
  } catch(e) {
    document.getElementById('ipoBody').innerHTML = '<tr><td colspan="6" class="loading-text">Failed to load IPO data.</td></tr>';
  }
})();
</script>
